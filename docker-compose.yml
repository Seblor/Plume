services:
  bot:
    container_name: Plume
    image: oven/bun:1-alpine
    working_dir: /app/bot
    command: ["sh", "docker-entrypoint.sh"]
    restart: unless-stopped
    user: "1000:1000"

    # Load secrets from bot/.env (see bot/.env.example)
    env_file:
      - bot/.env

    volumes:
      # Mount source directories — no image build needed
      - ./bot:/app/bot
      - ./shared_types:/app/shared_types

      # Persist the JSON database across container recreations.
      # lowdb creates the file automatically on first run, so no pre-seeding needed.
      # Uncomment to bind-mount it to the host:
      # - ./bot-data/db-prod.json:/app/bot/db-prod.json
